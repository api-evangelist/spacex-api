    QueryRequest:
      type: object
      description: MongoDB-style query request for paginated, filtered lookups
      properties:
        query:
          type: object
          description: MongoDB query filter object
          additionalProperties: true
        options:
          type: object
          description: Query options for pagination and population
          properties:
            limit:
              type: integer
              description: Maximum number of results to return
            offset:
              type: integer
              description: Number of results to skip
            page:
              type: integer
              description: Page number for pagination
            populate:
              type: array
              description: Fields to populate with referenced documents
              items:
                type: string
            select:
              type: object
              description: Field projection (1 to include, 0 to exclude)
              additionalProperties:
                type: integer
            sort:
              type: object
              description: Sort specification
              additionalProperties:
                type: integer
    QueryResult:
      type: object
      description: Paginated query result
      properties:
        docs:
          type: array
          description: Array of result documents
          items:
            type: object
        totalDocs:
          type: integer
          description: Total number of matching documents
        offset:
          type: integer
          description: Current offset
        limit:
          type: integer
          description: Results per page
        totalPages:
          type: integer
          description: Total number of pages
        page:
          type: integer
          description: Current page number
        pagingCounter:
          type: integer
          description: Index of first document in this page
        hasPrevPage:
          type: boolean
          description: Whether a previous page exists
        hasNextPage:
          type: boolean
          description: Whether a next page exists
        prevPage:
          type: integer
          nullable: true
          description: Previous page number
        nextPage:
          type: integer
          nullable: true
          description: Next page number
