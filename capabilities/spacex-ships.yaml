naftiko: 1.0.0-alpha2
info:
  label: SpaceX API — Ships
  description: 'SpaceX API — Ships. 2 operations. Lead operation: List All Ships. Self-contained Naftiko capability covering
    one Spacex Api business surface.'
  tags:
  - Spacex Api
  - Ships
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPACEX_API_API_KEY: SPACEX_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: spacex-ships
    baseUri: https://api.spacexdata.com/v5
    description: SpaceX API — Ships business capability. Self-contained, no shared references.
    resources:
    - name: ships
      path: /ships
      operations:
      - name: listships
        method: GET
        description: List All Ships
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: ships-id
      path: /ships/{id}
      operations:
      - name: getship
        method: GET
        description: Get Ship
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique ship identifier
          required: true
  exposes:
  - type: rest
    namespace: spacex-ships-rest
    port: 8080
    description: REST adapter for SpaceX API — Ships. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/ships
      name: ships
      description: REST surface for ships.
      operations:
      - method: GET
        name: listships
        description: List All Ships
        call: spacex-ships.listships
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/ships/{id}
      name: ships-id
      description: REST surface for ships-id.
      operations:
      - method: GET
        name: getship
        description: Get Ship
        call: spacex-ships.getship
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spacex-ships-mcp
    port: 9090
    transport: http
    description: MCP adapter for SpaceX API — Ships. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-ships
      description: List All Ships
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spacex-ships.listships
      outputParameters:
      - type: object
        mapping: $.
    - name: get-ship
      description: Get Ship
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spacex-ships.getship
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
