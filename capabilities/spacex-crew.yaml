naftiko: 1.0.0-alpha2
info:
  label: SpaceX API — Crew
  description: 'SpaceX API — Crew. 2 operations. Lead operation: List All Crew. Self-contained Naftiko capability covering
    one Spacex Api business surface.'
  tags:
  - Spacex Api
  - Crew
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPACEX_API_API_KEY: SPACEX_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: spacex-crew
    baseUri: https://api.spacexdata.com/v5
    description: SpaceX API — Crew business capability. Self-contained, no shared references.
    resources:
    - name: crew
      path: /crew
      operations:
      - name: listcrew
        method: GET
        description: List All Crew
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: crew-id
      path: /crew/{id}
      operations:
      - name: getcrewmember
        method: GET
        description: Get Crew Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique crew member identifier
          required: true
  exposes:
  - type: rest
    namespace: spacex-crew-rest
    port: 8080
    description: REST adapter for SpaceX API — Crew. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/crew
      name: crew
      description: REST surface for crew.
      operations:
      - method: GET
        name: listcrew
        description: List All Crew
        call: spacex-crew.listcrew
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crew/{id}
      name: crew-id
      description: REST surface for crew-id.
      operations:
      - method: GET
        name: getcrewmember
        description: Get Crew Member
        call: spacex-crew.getcrewmember
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spacex-crew-mcp
    port: 9090
    transport: http
    description: MCP adapter for SpaceX API — Crew. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-crew
      description: List All Crew
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spacex-crew.listcrew
      outputParameters:
      - type: object
        mapping: $.
    - name: get-crew-member
      description: Get Crew Member
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spacex-crew.getcrewmember
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
