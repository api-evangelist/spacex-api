naftiko: 1.0.0-alpha2
info:
  label: SpaceX API — Cores
  description: 'SpaceX API — Cores. 2 operations. Lead operation: List All Cores. Self-contained Naftiko capability covering
    one Spacex Api business surface.'
  tags:
  - Spacex Api
  - Cores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPACEX_API_API_KEY: SPACEX_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: spacex-cores
    baseUri: https://api.spacexdata.com/v5
    description: SpaceX API — Cores business capability. Self-contained, no shared references.
    resources:
    - name: cores
      path: /cores
      operations:
      - name: listcores
        method: GET
        description: List All Cores
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: cores-id
      path: /cores/{id}
      operations:
      - name: getcore
        method: GET
        description: Get Core
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique core identifier
          required: true
  exposes:
  - type: rest
    namespace: spacex-cores-rest
    port: 8080
    description: REST adapter for SpaceX API — Cores. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/cores
      name: cores
      description: REST surface for cores.
      operations:
      - method: GET
        name: listcores
        description: List All Cores
        call: spacex-cores.listcores
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/cores/{id}
      name: cores-id
      description: REST surface for cores-id.
      operations:
      - method: GET
        name: getcore
        description: Get Core
        call: spacex-cores.getcore
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spacex-cores-mcp
    port: 9090
    transport: http
    description: MCP adapter for SpaceX API — Cores. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-cores
      description: List All Cores
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spacex-cores.listcores
      outputParameters:
      - type: object
        mapping: $.
    - name: get-core
      description: Get Core
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spacex-cores.getcore
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
