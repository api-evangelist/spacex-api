naftiko: 1.0.0-alpha2
info:
  label: SpaceX API — Capsules
  description: 'SpaceX API — Capsules. 2 operations. Lead operation: List All Capsules. Self-contained Naftiko capability
    covering one Spacex Api business surface.'
  tags:
  - Spacex Api
  - Capsules
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPACEX_API_API_KEY: SPACEX_API_API_KEY
capability:
  consumes:
  - type: http
    namespace: spacex-capsules
    baseUri: https://api.spacexdata.com/v5
    description: SpaceX API — Capsules business capability. Self-contained, no shared references.
    resources:
    - name: capsules
      path: /capsules
      operations:
      - name: listcapsules
        method: GET
        description: List All Capsules
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: capsules-id
      path: /capsules/{id}
      operations:
      - name: getcapsule
        method: GET
        description: Get Capsule
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Unique capsule identifier
          required: true
  exposes:
  - type: rest
    namespace: spacex-capsules-rest
    port: 8080
    description: REST adapter for SpaceX API — Capsules. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/capsules
      name: capsules
      description: REST surface for capsules.
      operations:
      - method: GET
        name: listcapsules
        description: List All Capsules
        call: spacex-capsules.listcapsules
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/capsules/{id}
      name: capsules-id
      description: REST surface for capsules-id.
      operations:
      - method: GET
        name: getcapsule
        description: Get Capsule
        call: spacex-capsules.getcapsule
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: spacex-capsules-mcp
    port: 9090
    transport: http
    description: MCP adapter for SpaceX API — Capsules. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-capsules
      description: List All Capsules
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spacex-capsules.listcapsules
      outputParameters:
      - type: object
        mapping: $.
    - name: get-capsule
      description: Get Capsule
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: spacex-capsules.getcapsule
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
