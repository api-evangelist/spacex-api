aid: spacex-api
url: https://raw.githubusercontent.com/api-evangelist/spacex-api/refs/heads/main/apis.yml
name: SpaceX API
description: >-
  The SpaceX API is an open-source REST API providing comprehensive data about SpaceX
  missions, rockets, capsules, cores, crew, launchpads, landing pads, payloads, and the
  Starlink satellite constellation. It offers endpoints for all past and upcoming launches,
  real-time mission data, and vehicle telemetry. No authentication is required.
